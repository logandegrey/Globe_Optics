version: '3.9'
services:
  web:
    image: node:20
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @geo-globe/web dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
  api:
    image: node:20
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @geo-globe/api dev"
    ports:
      - "8080:8080"
